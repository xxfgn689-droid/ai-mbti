<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI MBTI 人格测试</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif; background: #0f0f1a; color: #e0e0f0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
.container { width: 100%; max-width: 640px; background: #1a1a2e; border-radius: 16px; padding: 32px; box-shadow: 0 4px 40px rgba(0,0,0,0.3); }
h1 { text-align: center; font-size: 24px; color: #a78bfa; margin-bottom: 8px; }
.subtitle { text-align: center; font-size: 13px; color: #6b7280; margin-bottom: 28px; }
.progress { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.progress-bar { flex: 1; height: 4px; background: #2d2d44; border-radius: 2px; margin-right: 12px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #a78bfa); border-radius: 2px; transition: width .3s; }
.progress-text { font-size: 13px; color: #a78bfa; white-space: nowrap; }
.question-block { margin-bottom: 24px; }
.q-num { font-size: 12px; color: #6b7280; margin-bottom: 6px; }
.q-text { font-size: 18px; font-weight: 600; margin-bottom: 20px; line-height: 1.5; }
.options { display: flex; flex-direction: column; gap: 12px; }
.option { padding: 16px 20px; background: #252540; border: 2px solid #2d2d44; border-radius: 12px; cursor: pointer; transition: all .2s; font-size: 15px; line-height: 1.5; }
.option:hover { border-color: #7c3aed; background: #2a2a48; }
.option.selected { border-color: #7c3aed; background: #2d2050; }
.option-letter { color: #a78bfa; font-weight: 700; margin-right: 8px; }
.nav { display: flex; justify-content: space-between; gap: 12px; margin-top: 24px; }
.btn { padding: 10px 24px; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; font-weight: 600; transition: all .2s; }
.btn-prev { background: #252540; color: #a0a0c0; }
.btn-prev:hover { background: #35355a; }
.btn-next { background: #7c3aed; color: #fff; flex: 1; }
.btn-next:hover { background: #6d28d9; }
.btn-submit { background: #10b981; color: #fff; flex: 1; }
.btn-submit:hover { background: #059669; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.result { text-align: center; }
.result-type { font-size: 48px; font-weight: 800; letter-spacing: 6px; color: #a78bfa; margin-bottom: 4px; }
.result-name { font-size: 22px; color: #c4b5fd; margin-bottom: 20px; }
.result-desc { font-size: 15px; color: #d1d5db; line-height: 1.7; margin-bottom: 28px; padding: 0 8px; }
.dimensions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.dim-card { background: #252540; border-radius: 12px; padding: 16px; }
.dim-label { font-size: 12px; color: #6b7280; margin-bottom: 8px; }
.dim-bar { display: flex; height: 6px; background: #1a1a2e; border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
.dim-bar-a { background: #7c3aed; border-radius: 3px; transition: width .5s; }
.dim-bar-b { background: #10b981; border-radius: 3px; transition: width .5s; }
.dim-scores { display: flex; justify-content: space-between; font-size: 12px; color: #a0a0c0; }
.dim-result { text-align: center; font-size: 13px; font-weight: 700; color: #a78bfa; margin-top: 4px; }
.restart { margin-top: 28px; padding: 10px 32px; background: #252540; color: #a0a0c0; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; font-weight: 600; }
.restart:hover { background: #35355a; color: #e0e0f0; }
@media (max-width: 480px) {
  .container { padding: 20px; }
  .q-text { font-size: 16px; }
  .result-type { font-size: 36px; }
}
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
const QUESTIONS = [
  {"id":1,"text":"当参加社交活动时，你通常：","optionA":"很容易和很多人交流互动，享受热闹氛围。","optionB":"更愿意和少数熟悉的人聊天，待在相对安静的角落。","dimension":"EI","a_indicates":"E","b_indicates":"I"},
  {"id":2,"text":"周末休息时，你更喜欢：","optionA":"约朋友一起出去玩，如逛街、聚会等。","optionB":"自己在家安静地看书、看电影。","dimension":"EI","a_indicates":"E","b_indicates":"I"},
  {"id":3,"text":"面对新认识的人，你：","optionA":"主动打招呼并开启话题。","optionB":"等对方先开口，再礼貌回应。","dimension":"EI","a_indicates":"E","b_indicates":"I"},
  {"id":4,"text":"你更倾向于：","optionA":"在团队讨论中积极发言，表达自己的想法。","optionB":"先倾听别人的意见，再谨慎表达自己的观点。","dimension":"EI","a_indicates":"E","b_indicates":"I"},
  {"id":5,"text":"当你有了开心的事，你会：","optionA":"马上和身边很多人分享。","optionB":"只和最亲密的几个人说。","dimension":"EI","a_indicates":"E","b_indicates":"I"},
  {"id":6,"text":"参加集体活动后，你会感觉：","optionA":"充满活力，还想继续参与其他活动。","optionB":"有些疲惫，需要独处一段时间恢复精力。","dimension":"EI","a_indicates":"E","b_indicates":"I"},
  {"id":7,"text":"在课堂或会议上，你：","optionA":"经常主动举手发言。","optionB":"除非被点名，否则很少主动发言。","dimension":"EI","a_indicates":"E","b_indicates":"I"},
  {"id":8,"text":"当你阅读一本书时，你更关注：","optionA":"书中具体的事实、细节和案例。","optionB":"书中所传达的理念、寓意和可能的发展。","dimension":"SN","a_indicates":"S","b_indicates":"N"},
  {"id":9,"text":"解决问题时，你：","optionA":"更依靠过去的经验和已知的方法。","optionB":"喜欢尝试新的方法和思路。","dimension":"SN","a_indicates":"S","b_indicates":"N"},
  {"id":10,"text":"你更擅长记住：","optionA":"具体的日期、名字、数据等信息。","optionB":"事物之间的关系和抽象的概念。","dimension":"SN","a_indicates":"S","b_indicates":"N"},
  {"id":11,"text":"看到一幅画，你首先注意到的是：","optionA":"画面中具体的景物、色彩和线条。","optionB":"这幅画所营造的氛围和传达的情感。","dimension":"SN","a_indicates":"S","b_indicates":"N"},
  {"id":12,"text":"对于未来的规划，你：","optionA":"更注重实际的目标和可实现的步骤。","optionB":"更关注未来的可能性和发展方向。","dimension":"SN","a_indicates":"S","b_indicates":"N"},
  {"id":13,"text":"当听别人讲故事时，你：","optionA":"在意故事是否真实发生，细节是否合理。","optionB":"更享受故事带来的想象和启发。","dimension":"SN","a_indicates":"S","b_indicates":"N"},
  {"id":14,"text":"在学习新知识时，你：","optionA":"喜欢从具体的实例开始，逐步理解原理。","optionB":"喜欢先了解整体的概念和框架，再深入细节。","dimension":"SN","a_indicates":"S","b_indicates":"N"},
  {"id":15,"text":"做决策时，你更看重：","optionA":"客观的事实和逻辑分析。","optionB":"他人的感受和关系的和谐。","dimension":"TF","a_indicates":"T","b_indicates":"F"},
  {"id":16,"text":"当朋友遇到困难向你倾诉时，你：","optionA":"会理性地分析问题，给出解决方案。","optionB":"先给予情感上的支持和安慰。","dimension":"TF","a_indicates":"T","b_indicates":"F"},
  {"id":17,"text":"你认为规则应该：","optionA":"严格遵守，无论什么情况。","optionB":"可以根据具体情况灵活调整。","dimension":"TF","a_indicates":"T","b_indicates":"F"},
  {"id":18,"text":"在团队合作中，你更在意：","optionA":"任务是否高效完成，结果是否符合标准。","optionB":"团队成员之间的相处氛围和关系。","dimension":"TF","a_indicates":"T","b_indicates":"F"},
  {"id":19,"text":"当和别人发生冲突时，你：","optionA":"会冷静地分析谁对谁错。","optionB":"更担心会伤害彼此的感情。","dimension":"TF","a_indicates":"T","b_indicates":"F"},
  {"id":20,"text":"评价一个人时，你更注重：","optionA":"他的能力和成就。","optionB":"他的品德和为人。","dimension":"TF","a_indicates":"T","b_indicates":"F"},
  {"id":21,"text":"你觉得在工作中，更重要的是：","optionA":"取得好的业绩和成果。","optionB":"与同事建立良好的关系。","dimension":"TF","a_indicates":"T","b_indicates":"F"},
  {"id":22,"text":"你平时的生活习惯是：","optionA":"喜欢制定详细的计划，并按计划行事。","optionB":"比较随意，更愿意根据实际情况调整。","dimension":"JP","a_indicates":"J","b_indicates":"P"},
  {"id":23,"text":"面对截止日期，你：","optionA":"会提前安排好时间，尽早完成任务。","optionB":"通常在截止日期前才会加快速度完成。","dimension":"JP","a_indicates":"J","b_indicates":"P"},
  {"id":24,"text":"当你准备去旅行时，你：","optionA":"会提前规划好行程、预订好酒店等。","optionB":"只确定大致的方向，到了当地再做安排。","dimension":"JP","a_indicates":"J","b_indicates":"P"},
  {"id":25,"text":"你更喜欢：","optionA":"有规律、有条理的生活。","optionB":"充满变化和惊喜的生活。","dimension":"JP","a_indicates":"J","b_indicates":"P"},
  {"id":26,"text":"在整理房间时，你：","optionA":"会把物品分类摆放整齐。","optionB":"只要能找到自己需要的东西就行，不太在意整齐。","dimension":"JP","a_indicates":"J","b_indicates":"P"},
  {"id":27,"text":"对于新的任务，你：","optionA":"希望尽快开始并完成它。","optionB":"想多了解一些相关信息后再开始。","dimension":"JP","a_indicates":"J","b_indicates":"P"},
  {"id":28,"text":"你在做事情时：","optionA":"喜欢有明确的目标和结果。","optionB":"更享受做事的过程，结果不是最重要的。","dimension":"JP","a_indicates":"J","b_indicates":"P"}
];

const TYPES = {
  "INTJ":{name:"建筑师",desc:"富有战略思维，独立且坚定。善于制定长远规划，对复杂系统有深刻洞察。"},
  "INTP":{name:"逻辑学家",desc:"创新型思考者，对知识和真理有强烈渴求。喜欢分析抽象概念和理论。"},
  "ENTJ":{name:"指挥官",desc:"天生的领导者，果断且自信。善于组织人员和资源实现目标。"},
  "ENTP":{name:"辩论家",desc:"聪明好奇的思想者，喜欢智力挑战。善于从多角度分析问题。"},
  "INFJ":{name:"提倡者",desc:"安静而神秘，富有理想主义和同理心。致力于帮助他人和让世界更美好。"},
  "INFP":{name:"调停者",desc:"富有诗意和理想主义，重视内在和谐与真实性。对价值观有深刻坚持。"},
  "ENFJ":{name:"主人公",desc:"富有魅力的领导者，善于激励他人。关注他人成长和群体和谐。"},
  "ENFP":{name:"竞选者",desc:"热情且有创造力，热爱探索可能性。善于与人建立深刻连接。"},
  "ISTJ":{name:"物流师",desc:"务实可靠，做事有条不紊。重视传统和规则，是值得信赖的执行者。"},
  "ISFJ":{name:"守卫者",desc:"温暖细心的保护者，忠诚且尽责。默默付出，守护所爱之人。"},
  "ESTJ":{name:"总经理",desc:"出色的管理者，果断且高效。善于组织流程和带领团队达成目标。"},
  "ESFJ":{name:"执政官",desc:"热情关怀的协调者，重视和谐与互助。善于照顾他人的实际需求。"},
  "ISTP":{name:"鉴赏家",desc:"冷静的观察者，善于动手解决问题。灵活务实，享受探索事物运作原理。"},
  "ISFP":{name:"探险家",desc:"温和的艺术灵魂，活在当下。通过感官和审美探索世界。"},
  "ESTP":{name:"企业家",desc:"精力充沛的行动派，善于临场发挥。喜欢冒险和直接体验。"},
  "ESFP":{name:"表演者",desc:"天生的娱乐家，热爱生活和社交。用热情和活力感染周围的人。"}
};

let answers = new Array(28).fill(null);
let current = 0;

function selectAnswer(qIdx, choice) {
  answers[qIdx] = choice;
  render();
}

function goNext() {
  if (answers[current] !== null && current < 27) { current++; render(); }
}

function goPrev() {
  if (current > 0) { current--; render(); }
}

function calculateResult() {
  const dims = {
    EI:{E:0,I:0,pair:["E","I"],tie:"I"},
    SN:{S:0,N:0,pair:["S","N"],tie:"N"},
    TF:{T:0,F:0,pair:["T","F"],tie:"F"},
    JP:{J:0,P:0,pair:["J","P"],tie:"P"}
  };
  QUESTIONS.forEach((q, i) => {
    if (answers[i]) {
      const letter = answers[i] === "A" ? q.a_indicates : q.b_indicates;
      dims[q.dimension][letter]++;
    }
  });
  const result = {};
  for (const [dim, data] of Object.entries(dims)) {
    const [a, b] = data.pair;
    result[dim] = { [a]: data[a], [b]: data[b], result: data[a] > data[b] ? a : (data[b] > data[a] ? b : data.tie) };
  }
  const mbti = ["EI","SN","TF","JP"].map(d => result[d].result).join("");
  return { mbti, info: TYPES[mbti] || {name:"未知",desc:""}, dimensions: result };
}

function render() {
  const app = document.getElementById("app");
  const allAnswered = answers.every(a => a !== null);
  const q = QUESTIONS[current];

  if (allAnswered && document.querySelector(".result")) {
    const r = calculateResult();
    app.innerHTML = `
      <div class="result">
        <div class="result-type">${r.mbti}</div>
        <div class="result-name">${r.info.name}</div>
        <div class="result-desc">${r.info.desc}</div>
        <div class="dimensions">
          ${["EI","SN","TF","JP"].map(d => {
            const dim = r.dimensions[d];
            const [a,b] = [dim[Object.keys(dim)[0]], dim[Object.keys(dim)[1]]];
            const total = a + b || 1;
            return `<div class="dim-card">
              <div class="dim-label">${d} 维度</div>
              <div style="display:flex;gap:8px;">
                <div class="dim-bar" style="flex:1;">
                  <div class="dim-bar-a" style="width:${(a/total*100)}%"></div>
                </div>
                <div class="dim-bar" style="flex:1;">
                  <div class="dim-bar-b" style="width:${(b/total*100)}%"></div>
                </div>
              </div>
              <div class="dim-scores">
                <span>${Object.keys(dim)[0]}: ${a}</span>
                <span>${Object.keys(dim)[1]}: ${b}</span>
              </div>
              <div class="dim-result">→ ${dim.result}</div>
            </div>`;
          }).join("")}
        </div>
        <button class="restart" onclick="location.reload()">重新测试</button>
      </div>`;
    return;
  }

  app.innerHTML = `
    <h1>MBTI 人格测试</h1>
    <p class="subtitle">28题 · 发现你的真实人格类型</p>
    <div class="progress">
      <div class="progress-bar"><div class="progress-fill" style="width:${(current+1)/28*100}%"></div></div>
      <span class="progress-text">${current+1} / 28</span>
    </div>
    <div class="question-block">
      <div class="q-num">第 ${q.id} 题 · ${q.dimension} 维度</div>
      <div class="q-text">${q.text}</div>
      <div class="options">
        <div class="option${answers[current]==='A'?' selected':''}" onclick="selectAnswer(${current},'A')">
          <span class="option-letter">A.</span>${q.optionA}
        </div>
        <div class="option${answers[current]==='B'?' selected':''}" onclick="selectAnswer(${current},'B')">
          <span class="option-letter">B.</span>${q.optionB}
        </div>
      </div>
    </div>
    <div class="nav">
      <button class="btn btn-prev" onclick="goPrev()" ${current===0?'disabled':''}>上一题</button>
      ${current < 27
        ? `<button class="btn btn-next" onclick="goNext()" ${answers[current]===null?'disabled':''}>下一题</button>`
        : `<button class="btn btn-submit" onclick="render()" ${!allAnswered?'disabled':''}>查看结果</button>`
      }
    </div>`;
}

render();
</script>
</body>
</html>
